<script>
  // ============ GLOBAL STATE ============
  var appData = {
    currentTab: 'dashboard',
    members: [],
    settings: { ratePerUnit: 5, notifyDay: 25 },
    recordedDrafts: {}, // { memberId: { after: 0, water: bool, elec: bool, common: bool } }
    paymentMethods: [],
    history: [],
    yearly: { water: 0, electric: 0, topUsers: [] },
    isCalculating: false // 🔒 2.1 กันกดปุ่มซ้ำ
  };

  var trendChart = null;

  // ============ INIT ============
  document.addEventListener('DOMContentLoaded', init);

  function init() {
    showLoading('กำลังโหลดข้อมูลพื้นฐาน...');

    // 1. Load Settings
    google.script.run
      .withSuccessHandler(function (settings) {
        appData.settings = settings;
        document.getElementById('settingRate').value = settings.ratePerUnit;
        document.getElementById('settingNotifyDay').value = settings.notifyDay;
        document.getElementById('waterBillTotal').value = '';
        document.getElementById('electricBillTotal').value = '';

        checkNotification(settings.notifyDay);
        loadDashboard();
      })
      .getSettings();

    // 5. Build-in Unload Protection (ป้องกันรีเฟรชหน้าจอระหว่างสรุปบิล)
    window.addEventListener('beforeunload', function (e) {
      // แจ้งเตือนถ้าหน้าต่างใบแจ้งหนี้ยังเปิดอยู่
      if (!document.getElementById('invoiceModal').classList.contains('hidden')) {
        e.preventDefault();
        e.returnValue = ''; // มาตรฐานเบราว์เซอร์สำหรับแสดงหน้าต่างแจ้งเตือน
      }
    });

    // 2. Load Members
    loadMembers();

    // โหลด Draft จาก localStorage ป้องกันเน็ตหลุด/รีเฟรช (4.2)
    loadDraftFromLocal();

    // 3. Load Payment Methods
    google.script.run
      .withSuccessHandler(function (methods) {
        appData.paymentMethods = methods;
        var select = document.getElementById('paymentMethod');
        select.innerHTML = '<option value="">-- เลือกช่องทางชำระเงิน --</option>';
        methods.forEach(m => {
          var opt = document.createElement('option');
          opt.value = m.methodId;
          opt.textContent = `${m.methodName} - ${m.accountNumber} (${m.accountName})`;
          select.appendChild(opt);
        });
      })
      .getPaymentMethods();

  }

  function loadMembers() {
    google.script.run
      .withSuccessHandler(function (members) {
        appData.members = members;
        renderMemberList();
        renderSettingsMemberList();
        updateProgressCount();
      })
      .getMembers();
  }

  function loadDashboard() {
    google.script.run
      .withSuccessHandler(function (stats) {
        hideLoading();

        // แสดง error จริงใน console เพื่อ debug
        console.log('Dashboard stats received:', stats);

        if (stats.error) {
          showToast('โหลดข้อมูลไม่สำเร็จ: ' + stats.error, 'danger');
          return;
        }

        appData.history = stats.history || [];
        appData.yearly = stats.yearly || { water: 0, electric: 0, topUsers: [] };

        if (appData.history.length === 0) {
          // มีข้อมูลในชีทแต่ยังไม่มีในปีนี้ — แสดงกราฟเปล่า ไม่ error
          showToast('ยังไม่มีข้อมูลเดือนนี้', 'success');
        }

        renderTrendChart(appData.history);
        renderCommonChart(appData.history);
        renderYearlyStats(appData.yearly);
      })
      .withFailureHandler(function (e) {
        hideLoading();
        console.error('getDashboardStats failed:', e);
        showToast('เชื่อมต่อ Server ไม่สำเร็จ', 'danger');
      })
      .getDashboardStats();
  }

  // ============ NAVIGATION ============
  function switchTab(tabId) {
    // Update Nav UI
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + tabId).classList.add('active');

    // Update Views (SPA)
    document.querySelectorAll('.tab-view').forEach(el => {
      el.classList.add('hidden');
      el.classList.remove('active');
    });

    var nextTab = document.getElementById('tab-' + tabId);
    nextTab.classList.remove('hidden');
    setTimeout(() => nextTab.classList.add('active'), 50);

    appData.currentTab = tabId;
  }


  // ============ DASHBOARD ============
  function renderTrendChart(history) {
    var ctx = document.getElementById('trendChart').getContext('2d');
    if (!ctx) return;

    // Clear previous chart if any (Chart.js instance is tracked globally if needed, but trendChart is global)
    if (window.trendChartInstance) window.trendChartInstance.destroy();

    window.trendChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: history.map(h => h.month.split(' ')[0]),
        datasets: [
          {
            label: 'บิลประปา (หลวง)',
            data: history.map(h => h.water),
            borderColor: '#0081cf',
            backgroundColor: 'rgba(0, 129, 207, 0.1)',
            fill: true,
            tension: 0.4
          },
          {
            label: 'บิลไฟฟ้า (หลวง)',
            data: history.map(h => h.electric),
            borderColor: '#ff9671',
            backgroundColor: 'rgba(255, 150, 113, 0.1)',
            fill: true,
            tension: 0.4
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: true, position: 'top', labels: { boxWidth: 10, font: { size: 10 } } } },
        scales: {
          y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function renderCommonChart(history) {
    var ctx = document.getElementById('commonChart').getContext('2d');
    if (!ctx) return;

    if (window.commonChartInstance) window.commonChartInstance.destroy();

    window.commonChartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: history.map(h => h.month.split(' ')[0]),
        datasets: [
          {
            label: 'ค่าไฟส่วนกลางรวม',
            data: history.map(h => h.commonTotal),
            backgroundColor: '#f59e0b',
            borderRadius: 8
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function renderYearlyStats(yearly) {
    var topContainer = document.getElementById('dash-top-users');
    if (!yearly.topUsers || yearly.topUsers.length === 0) {
      topContainer.innerHTML = '<div class="text-center py-4 text-slate-400 text-sm italic">ไม่มีข้อมูลการใช้งานรายปี</div>';
      return;
    }

    // Backend already sorts desc, but for safety:
    var users = yearly.topUsers.sort((a, b) => b.total - a.total);

    topContainer.innerHTML = users.map((u, i) => `
    <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl">
      <div class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center font-bold text-xs">${i + 1}</div>
      <div class="flex-1">
        <div class="text-sm font-bold text-slate-700">${u.name}</div>
        <div class="text-[10px] text-slate-400">สะสมปีนี้</div>
      </div>
      <div class="text-sm font-bold text-primary">฿${fmtNum(u.total)}</div>
    </div>
  `).join('');
  }

  function checkNotification(notifyDay) {
    var today = new Date().getDate();
    if (today >= notifyDay && today <= (notifyDay + 5)) {
      document.getElementById('notif-banner').classList.remove('hidden');
      document.getElementById('notif-dot').classList.remove('hidden');
    }
  }

  // ============ METER RECORDING (STEP-BY-STEP) ============
  function renderMemberList() {
    var container = document.getElementById('membersContainer');
    container.innerHTML = '';

    appData.members.forEach(m => {
      var draft = appData.recordedDrafts[m.memberId];
      var isDone = !!draft;

      var card = document.createElement('div');
      card.className = `bg-white p-4 rounded-2xl border ${isDone ? 'border-success/20 bg-success/5' : 'border-slate-100'} shadow-sm flex items-center gap-4 transition-all active:scale-[0.98]`;
      card.onclick = () => openRecordingModal(m.memberId);

      card.innerHTML = `
      <div class="w-10 h-10 rounded-xl flex items-center justify-center ${isDone ? 'bg-success text-white' : 'bg-slate-100 text-slate-400'}">
        <span class="material-symbols-rounded">${isDone ? 'done_all' : 'edit'}</span>
      </div>
      <div class="flex-1">
        <div class="text-sm font-bold ${isDone ? 'text-success' : 'text-slate-700'}">${m.name}</div>
        <div class="text-[10px] text-slate-400">ID: ${m.memberId} | มิเตอร์: ${m.meterNo || '-'}</div>
      </div>
      <div>
        <div class="text-[10px] font-bold text-right ${isDone ? 'text-success' : 'text-slate-300'} uppercase">${isDone ? 'บันทึกแล้ว' : 'ยังไม่ได้จด'}</div>
        <div class="text-xs font-mono font-bold text-slate-600 text-right">${isDone ? draft.after : '-'}</div>
      </div>
    `;
      container.appendChild(card);
    });
  }

  var currentRecordingMember = null;

  function openRecordingModal(memberId) {
    var m = appData.members.find(x => x.memberId === memberId);
    if (!m) return;

    currentRecordingMember = m;
    document.getElementById('m-name').textContent = m.name;
    document.getElementById('m-id-meter').textContent = `${m.memberId} | มิเตอร์: ${m.meterNo || '-'}`;
    document.getElementById('m-val-before').textContent = m.lastMeterReading;

    // Draft values
    var draft = appData.recordedDrafts[memberId];
    document.getElementById('m-val-after').value = (draft && draft.after > 0) ? draft.after : '';

    // Status Toggle Initialization
    var statusToggle = document.getElementById('m-status-toggle');
    // Logic: Active if any bill is active in draft, or default to true for new
    var isStatusActive = draft ? (draft.water || draft.elec || draft.common) : true;
    statusToggle.checked = isStatusActive;
    toggleMasterStatus(isStatusActive);

    // Toggles
    renderModalToggles(m, draft);
    resetOcrApp();

    document.getElementById('recordingModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function toggleMasterStatus(isOn) {
    var depUi = document.getElementById('m-status-dependent-ui');
    if (isOn) {
      depUi.classList.remove('opacity-20', 'pointer-events-none');
      depUi.style.display = 'block';
    } else {
      depUi.classList.add('opacity-20', 'pointer-events-none');
      // We still show the exempt message or input if needed? 
      // User said: "ถ้าปิด สมาชิกท่านนี้จะไม่ถูกนำไปคิด" -> Hide everything
      depUi.style.display = 'none';
    }
  }

  function renderModalToggles(m, draft) {
    var container = document.getElementById('m-toggles');
    container.innerHTML = '';

    var isExempt = m.isExemptElectric || (m.memberId === 'EW9001');

    var types = [
      { key: 'water', label: 'ค่าน้ำ', active: draft ? draft.water : m.waterActive },
      { key: 'elec', label: 'ค่าไฟ', active: draft ? draft.elec : (m.electricActive && !isExempt), hide: isExempt },
      { key: 'common', label: 'ค่าไฟส่วนกลาง', active: draft ? draft.common : (m.commonElectricActive && !isExempt), hide: isExempt }
    ];

    types.forEach(t => {
      if (t.hide) return;

      var isWater = (t.key === 'water');
      var colorClass = isWater ? 'switch-water' : 'switch-elec';

      var item = document.createElement('div');
      item.className = 'flex items-center gap-2';
      item.innerHTML = `
        <label class="switch ${colorClass} scale-[0.85] origin-left">
            <input type="checkbox" id="m-toggle-${t.key}" ${t.active ? 'checked' : ''}>
            <span class="slider"></span>
        </label>
        <div class="text-[11px] font-bold text-slate-700 -ml-1">${t.label}</div>
    `;
      container.appendChild(item);
    });

    // Handle Exempt Electric UI details
    var inputSection = document.getElementById('m-input-section');
    var exemptMsg = document.getElementById('m-exempt-msg');
    if (isExempt) {
      inputSection.classList.add('hidden');
      exemptMsg.classList.remove('hidden');
    } else {
      inputSection.classList.remove('hidden');
      exemptMsg.classList.add('hidden');
    }
  }

  function closeRecordingModal() {
    document.getElementById('recordingModal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  function saveDraftReading() {
    var m = currentRecordingMember;
    var isStatusOn = document.getElementById('m-status-toggle').checked;
    var isExempt = m.isExemptElectric || (m.memberId === 'EW9001');

    if (isStatusOn) {
      var valAfter = document.getElementById('m-val-after').value;
      if (!isExempt && !valAfter) {
        showToast('กรุณากรอกเลขมิเตอร์ครั้งนี้', 'danger');
        return;
      }

      var toggles = {
        water: !!document.getElementById('m-toggle-water')?.checked,
        elec: !!document.getElementById('m-toggle-elec')?.checked,
        common: !!document.getElementById('m-toggle-common')?.checked
      };

      appData.recordedDrafts[m.memberId] = {
        after: isExempt ? 0 : parseFloat(valAfter),
        toggleMaster: true,
        water: !!toggles.water,
        elec: !!toggles.elec,
        common: !!toggles.common
      };
    } else {
      // Away status: all off, usage = 0
      appData.recordedDrafts[m.memberId] = {
        after: m.lastMeterReading, // Same as before
        toggleMaster: false,
        water: false,
        elec: false,
        common: false
      };
    }

    showToast('✅ บันทึกชั่วคราวแล้ว');
    saveDraftToLocal(); // 💾 สำรองลง localStorage
    renderMemberList();
    updateProgressCount();
    closeRecordingModal();
  }

  function updateProgressCount() {
    var done = Object.keys(appData.recordedDrafts).length;
    var total = appData.members.length;
    document.getElementById('recorded-count').textContent = `${done}/${total} จดแล้ว`;
  }

  // ============ CALCULATE & SAVE ============
  function handleCalculate() {
    // 🔒 ป้องกัน Double Submit กด 2 ครั้ง (2.1)
    if (appData.isCalculating) return;

    var waterBill = document.getElementById('waterBillTotal').value;
    var elecBill = document.getElementById('electricBillTotal').value;
    var pmId = document.getElementById('paymentMethod').value;

    if (!waterBill || !elecBill) { showToast('กรุณากรอกยอดบิลรวมจากหลวง', 'danger'); return; }
    if (!pmId) { showToast('กรุณาเลือกบัญชีชำระเงิน', 'danger'); return; }

    var recordedCount = Object.keys(appData.recordedDrafts).length;
    if (recordedCount < appData.members.length) {
      if (!confirm(`ยังจดไม่ครบ (จดแล้ว ${recordedCount}/${appData.members.length}) ต้องการคำนวณเลยหรือไม่?`)) return;
    }

    var membersParams = appData.members.map(m => {
      var draft = appData.recordedDrafts[m.memberId] || { after: 0, toggleMaster: true, water: m.waterActive, elec: m.electricActive, common: m.commonElectricActive };
      return {
        memberId: m.memberId,
        name: m.name,
        meterNo: m.meterNo,
        meterBefore: m.lastMeterReading,
        meterAfter: draft.after,
        toggleMaster: draft.toggleMaster,
        waterActive: draft.water,
        electricActive: draft.elec,
        commonElectricActive: draft.common,
        isExemptElectric: m.isExemptElectric
      };
    });

    // 🔒 ล็อคปุ่มกันกดซ้ำ
    appData.isCalculating = true;
    var btn = document.getElementById('btnCalculate');
    if (btn) {
      btn.disabled = true;
      btn.style.opacity = '0.5';
    }

    showLoading('กำลังสรุปยอดเดือนนี้...');
    google.script.run
      .withSuccessHandler(function(summary) {
        appData.isCalculating = false;
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
        onCalcSuccess(summary);
      })
      .withFailureHandler(function(e) {
        appData.isCalculating = false;
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
        hideLoading();
        alert(e.message);
      })
      .calculateAndSave({
        waterBillTotal: parseFloat(waterBill),
        electricBillTotal: parseFloat(elecBill),
        paymentMethodId: pmId,
        members: membersParams
      });
  }

  function onCalcSuccess(summary) {
    hideLoading();
    showToast('✅ บันทึกข้อมูลเรียบร้อย');

    // Reset Global inputs
    document.getElementById('waterBillTotal').value = '';
    document.getElementById('electricBillTotal').value = '';
    document.getElementById('paymentMethod').value = '';

    // Show modal FIRST to ensure visibility
    document.getElementById('invoiceModal').classList.remove('hidden');

    try {
      renderInvoices(summary);
    } catch (err) {
      console.error('Render Error:', err);
      showToast('การแสดงผลใบแจ้งหนี้บางส่วนมีปัญหา', 'danger');
    }
  }

  // ============ INVOICES ============
  function renderInvoices(summary) {
    var container = document.getElementById('invoicesContainer');
    container.innerHTML = '';

    summary.members.forEach(m => {
      var card = document.createElement('div');
      card.className = 'inv-container';
      card.id = 'invoice-' + m.memberId;

      var pm = summary.paymentMethod;
      var ppId = pm ? (pm.promptpayId || pm.accountNumber || '').replace(/[^0-9]/g, '') : '';

      // QR Code logic - Dynamic amount (Local Generation)
      var qrPlaceholder = (pm && ppId) ? `
      <div class="qr-container">
          <img id="qr-${m.memberId}" class="w-full h-full object-contain qr-img" src="">
      </div>
    ` : '';

      var pmHtml = pm ? `
      <div class="payment-box mt-6">
        <div class="text-[11px] font-bold text-slate-400 uppercase mb-4 text-center">ชำระค่าน้ำ - ค่าไฟ ได้ที่</div>
        <div class="flex items-center gap-5">
            ${qrPlaceholder}
            <div class="flex-1 space-y-0.5">
                <div class="text-[11px] font-bold text-slate-800">${pm.methodName}</div>
                <div class="text-xs font-bold text-slate-600">${pm.accountName}</div>
                <div class="text-xl font-bold text-primary tracking-tight mt-1">${pm.accountNumber}</div>
            </div>
        </div>
      </div>
    ` : '';

      card.innerHTML = `
        <div class="invoice-header">
            <div class="badge-gradient">${m.memberId} | ${m.name}</div>
            <div class="text-[11px] text-slate-400 font-bold">มิเตอร์: ${m.meterNo || '-'}</div>
            <div class="invoice-title-blue">ใบแจ้งหนี้ / Invoice</div>
            <div class="text-[10px] text-slate-500 font-medium mt-1">ระบบบริหารจัดการค่าน้ำ - ค่าไฟ คณะ 9</div>
            <div class="text-[10px] text-slate-400">วัดมหาธาตุฯ เขตพระนคร กรุงเทพมหานคร</div>
            <div class="text-sm font-bold text-slate-800 mt-2">เดือน ${summary.billingMonth}</div>
        </div>
        
        <div class="invoice-divider"></div>

        <div class="space-y-1.5 px-1">
            <div class="row-item"><span class="row-label">ค่าน้ำจากการประปา</span><span class="row-value">฿${fmtNum(summary.waterBillTotal)}</span></div>
            <div class="row-item"><span class="row-label">ค่าไฟจากการไฟฟ้า</span><span class="row-value">฿${fmtNum(summary.electricBillTotal)}</span></div>
        </div>

        <div class="invoice-divider"></div>

        <div class="space-y-3 px-1">
            <div class="text-[10px] font-bold text-slate-400 uppercase mb-1">รายละเอียด</div>
            
            <!-- ค่าน้ำ -->
            <div>
                <div class="row-item"><span class="row-label">ค่าน้ำประปา</span><span class="row-value">฿${fmtNum(m.waterAmount)}</span></div>
                ${m.waterAmount > 0 ? `<div class="text-[9px] text-slate-400 leading-none mt-0.5 italic">(หาร ${summary.waterActiveCount} คน)</div>` : ''}
            </div>

            <!-- ค่าไฟห้อง -->
            <div>
                <div class="row-item"><span class="row-label">ค่าไฟฟ้า</span><span class="row-value">฿${fmtNum(m.roomElectric)}</span></div>
                ${m.roomElectric > 0 ? `<div class="text-[9px] text-slate-400 leading-none mt-0.5 italic">(${m.meterAfter} - ${m.meterBefore} = ${m.unitsUsed} หน่วย x ${summary.ratePerUnit})</div>` : ''}
            </div>

            <!-- ค่าไฟส่วนกลาง -->
            <div>
                <div class="row-item"><span class="row-label">ค่าไฟส่วนกลาง</span><span class="row-value">฿${fmtNum(m.commonElectric)}</span></div>
                ${m.commonElectric > 0 ? `<div class="text-[9px] text-slate-400 leading-none mt-0.5 italic">(หาร ${summary.commonActiveCount} คน)</div>` : ''}
            </div>
        </div>

        <div class="invoice-divider"></div>

        <div class="total-highlight">
            <span>รวมทั้งสิ้น</span>
            <span>฿${fmtNum(m.totalAmount)}</span>
        </div>

        ${pmHtml}

        <div class="text-center space-y-1 mt-8">
            <div class="text-[9px] text-slate-400 font-medium">หมายเหตุ: จดมิเตอร์ทุกวันที่ 25 ของเดือน</div>
            <div class="text-[10px] text-slate-300 italic font-semibold">The9Electric&Water by Saila</div>
        </div>
        
        <div class="flex gap-2 mt-8 no-print" data-html2canvas-ignore="true">
            <button onclick="saveImage('${m.memberId}')" class="flex-1 bg-primary/10 text-primary py-3 rounded-2xl text-[10px] font-bold flex items-center justify-center gap-1"><span class="material-symbols-rounded text-sm">photo_camera</span> บันทึกภาพ</button>
            <button onclick="printInvoice('${m.memberId}')" class="flex-1 bg-accent/10 text-accent py-3 rounded-2xl text-[10px] font-bold flex items-center justify-center gap-1"><span class="material-symbols-rounded text-sm">print</span> พิมพ์</button>
            <button onclick="shareLine('${m.memberId}')" class="flex-1 bg-[#00b900]/10 text-[#00b900] py-3 rounded-2xl text-[10px] font-bold flex items-center justify-center gap-1"><span class="material-symbols-rounded text-sm">send</span> ส่ง LINE</button>
        </div>
    `;
      container.appendChild(card);

      // ===== QR แบบใหม่ (ใช้ API เป็นรูปจริง) =====
      if (pm && ppId) {
        try {
          var payload = generatePromptPayPayload(ppId, m.totalAmount);

          var qrUrl =
            "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
            encodeURIComponent(payload);

          if (img) {
            img.src = qrUrl;
          }

          console.error("QR ERROR:", err);
        }
      }

  // ============ OCR ============
  var ocrImg64 = null;
  function openOcrCamera() { document.getElementById('ocrCaptureInput').click(); }
  function handleOcrFile(e) {
    var f = e.target.files[0];
    if (!f) return;
    var r = new FileReader();
    r.onload = function (ev) {
      ocrImg64 = ev.target.result;
      document.getElementById('ocrPreview').src = ocrImg64;
      document.getElementById('ocrZone').classList.add('has-img');

      // Auto-trigger AI Analysis after photo is loaded
      analyzeOcr();
    };
    r.readAsDataURL(f); e.target.value = '';
  }
  function analyzeOcr() {
    if (!ocrImg64) return;
    document.getElementById('ocrZone').classList.add('scanning');

    // ระบบ Timeout ป้องกันการค้าง 30 วินาที
    var timeoutId = setTimeout(function() {
      document.getElementById('ocrZone').classList.remove('scanning');
      showToast('⚠️ หมดเวลาวิเคราะห์ AI กรุณาลองใหม่อีกครั้ง', 'danger');
    }, 30000);

    google.script.run
      .withSuccessHandler(function (res) {
        clearTimeout(timeoutId); // ปิดระบบ Timeout
        document.getElementById('ocrZone').classList.remove('scanning');
        if (res.success) {
          document.getElementById('m-val-after').value = res.reading;
          showToast('✅ AI อ่านได้: ' + res.reading);
        } else { alert(res.error); }
      })
      .withFailureHandler(function (e) {
        clearTimeout(timeoutId);
        document.getElementById('ocrZone').classList.remove('scanning');
        alert('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์: ' + e.message);
      })
      .readElecMeterFromBase64(ocrImg64);
  }
  function resetOcrApp() {
    ocrImg64 = null;
    document.getElementById('ocrPreview').src = '';
    document.getElementById('ocrZone').classList.remove('has-img', 'scanning');
  }

  async function waitForImages(container) {
    const images = container.querySelectorAll("img");

        img.onerror = resolve;
      });
    }));
  }

      });
    });
  }

  // ============ PROMPTPAY QR HELPERS ============
  function generatePromptPayPayload(ppId, amount) {
    // ล้างข้อมูล
    ppId = String(ppId).replace(/[^0-9]/g, '');

    let target = '';

    // ===== เบอร์โทร =====
    if (ppId.length === 10 && ppId.startsWith('0')) {
      const mobile = '0066' + ppId.substring(1); // 0066 + ตัด 0 หน้า
      target = '01' + mobile.length.toString().padStart(2, '0') + mobile;
    }
    // ===== เลขบัตรประชาชน =====
    else if (ppId.length === 13) {
      target = '02' + ppId.length.toString().padStart(2, '0') + ppId;
    }
    else {
      throw new Error('PromptPay ไม่ถูกต้อง: ' + ppId);
    }

    // Merchant Account Information
    const AID = 'A000000677010111';
    const merchant =
      '00' + AID.length.toString().padStart(2, '0') + AID +
      target;

    const tag29 = '29' + merchant.length.toString().padStart(2, '0') + merchant;

    // Amount
    const amt = parseFloat(amount).toFixed(2);
    const tag54 = '54' + amt.length.toString().padStart(2, '0') + amt;

    // Payload (ไม่มี CRC ก่อน)
    const payload =
      '000201' +          // Payload Format
      '010212' +          // Static QR with amount
      tag29 +
      '5303764' +         // Currency: THB
      tag54 +
      '5802TH' +
      '6304';

    return payload + crc16(payload);
  }

  function crc16(s) {
    let crc = 0xFFFF;
    for (let i = 0; i < s.length; i++) {
      crc ^= s.charCodeAt(i) << 8;
      for (let j = 0; j < 8; j++) {
        crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
      }
    }
    return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
  }

  function printInvoice(memberId) {
    // ซ่อนใบแจ้งหนี้ใบอื่นชั่วคราวเพื่อให้พิมพ์เฉพาะใบที่ต้องการ
    const allInvoices = document.querySelectorAll('.inv-container');
    allInvoices.forEach(el => {
      if (el.id !== 'invoice-' + memberId) el.classList.add('no-print');
    });

    window.print();

    // คืนค่าเพื่อให้แสดงผลได้ปกติในแอป
    setTimeout(() => {
      allInvoices.forEach(el => el.classList.remove('no-print'));
    }, 500);
  }

  // ============ DRAFT LOCALSTORAGE BACKUP (4.2) ============
  function saveDraftToLocal() {
    try {
      localStorage.setItem('ewms_drafts', JSON.stringify(appData.recordedDrafts));
    } catch (e) {
      console.warn('localStorage save failed:', e);
    }
  }

  function loadDraftFromLocal() {
    try {
      var saved = localStorage.getItem('ewms_drafts');
      if (saved) {
        var parsed = JSON.parse(saved);
        if (parsed && typeof parsed === 'object') {
          appData.recordedDrafts = parsed;
          if (Object.keys(parsed).length > 0) {
            console.log('Restored draft:', Object.keys(parsed).length, 'items');
            // We don't renderMemberList() here because it's called just before in init()
            // but we can update progress count
            setTimeout(updateProgressCount, 500); 
          }
        }
      }
    } catch (e) {
      console.warn('localStorage load failed:', e);
    }
  }

  function clearDraftFromLocal() {
    try {
      localStorage.removeItem('ewms_drafts');
    } catch (e) {
      console.warn('localStorage clear failed:', e);
    }
  }
